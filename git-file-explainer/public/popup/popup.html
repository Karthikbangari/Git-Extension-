<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git File Explainer</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header>
      <h1><span class="gfe-logo">◈</span> Git File Explainer</h1>
    </header>

    <main>
      <section id="onboarding-banner" style="display: none">
        <p class="onboarding-title">Set up AI explanations</p>
        <ol class="onboarding-steps">
          <li>
            Get a free API key at
            <a href="https://console.anthropic.com" target="_blank" rel="noopener noreferrer"
              >console.anthropic.com ↗</a
            >
          </li>
          <li>Paste it in the field below and click Save</li>
        </ol>
      </section>

      <div class="gfe-card">
        <section class="field">
          <label for="api-key">Anthropic API Key</label>
          <div class="input-row">
            <input
              type="password"
              id="api-key"
              placeholder="sk-ant-..."
              autocomplete="off"
              spellcheck="false"
            />
            <button id="save-key">Save</button>
          </div>
          <p class="hint" id="key-status"></p>
        </section>
      </div>

      <div class="gfe-card">
        <section class="field" id="token-section">
          <label>Token usage</label>
          <div class="token-meter">
            <div class="token-row">
              <span class="token-label">Input</span>
              <span class="token-value" id="token-input">—</span>
            </div>
            <div class="token-row">
              <span class="token-label">Output</span>
              <span class="token-value" id="token-output">—</span>
            </div>
            <div class="token-row token-total">
              <span class="token-label">Total</span>
              <span class="token-value" id="token-total">—</span>
            </div>
          </div>
          <button class="reset-btn" id="reset-tokens">Reset counter</button>
        </section>
      </div>
    </main>

    <button id="open-dashboard" class="gfe-dashboard-link" aria-label="Open dashboard">
      Dashboard ↗
    </button>

    <script src="./popup.js"></script>
  </body>
</html>
